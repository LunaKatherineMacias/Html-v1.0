<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="contenedor">
    <h2>Formulario de Registro</h2>

    <form id="formulario">

        <!-- Tipo de documento -->
        <div class="campo">
            <label for="tipoDocumento">Tipo de documento:</label>
            <select id="tipoDocumento">
                <option>Selecciona una opción</option>
                <option>Cédula de Ciudadanía</option>
                <option>Tarjeta de Identidad</option>
                <option>Cédula de Extranjería</option>
                <option>Pasaporte</option>
            </select>
            <span class="error" id="error-tipoDocumento"></span>
        </div>

        <!-- Número de documento -->
        <div class="campo">
            <label for="documento">Número de documento:</label>
            <input type="text" id="documento">
            <span class="error" id="error-documento"></span>
        </div>

        <!-- Nombre -->
        <div class="campo">
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre">
            <span class="error" id="error-nombre"></span>
        </div>

        <!-- Correo -->
        <div class="campo">
            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo">
            <span class="error" id="error-correo"></span>
        </div>

        <!-- Teléfono -->
        <div class="campo">
            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono">
            <span class="error" id="error-telefono"></span>
        </div>

        <!-- Género -->
        <div class="campo">
            <label for="genero">Género:</label>
            <select id="genero">
                <option>Selecciona una opción</option>
                <option>Femenino</option>
                <option>Masculino</option>
                <option>Otro</option>
            </select>
            <span class="error" id="error-genero"></span>
        </div>

        <!-- Fecha de inscripción -->
        <div class="campo">
            <label for="fecha">Fecha de inscripción:</label>
            <input type="date" id="fecha">
            <span class="error" id="error-fecha"></span>
        </div>

        <button type="submit">Enviar</button>

        <p id="mensajeExito" class="exito oculto">✔ Formulario enviado con éxito</p>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
