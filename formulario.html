<!DOCTYPE html>
<html>
<head>
    <title>Formulario de Registro</title>
</head>

<body style="font-family: Arial, sans-serif; text-align: center;">

    <h2>Registro de Usuario</h2>

    <form style="display: inline-block; text-align: left;">

        <label>Nombre:</label><br>
        <input type="text" name="nombre"><br><br>

        <label>Apellido:</label><br>
        <input type="text" name="apellido"><br><br>

        <label>Fecha de nacimiento:</label><br>
        <input type="date" name="fecha"><br><br>

        <label>Teléfono:</label><br>
        <input type="tel" name="telefono"><br><br>

        <label>Correo electrónico:</label><br>
        <input type="email" name="correo"><br><br>

        <label>Intereses:</label><br>
        <input type="checkbox" name="interes"> Informática<br>
        <input type="checkbox" name="interes"> Música<br>
        <input type="checkbox" name="interes"> Arte<br><br>

        <label>Experiencia:</label><br>
        <textarea name="experiencia" rows="4" cols="30"></textarea><br><br>

        <input type="submit" value="Enviar">

    </form>

</body>
</html>
