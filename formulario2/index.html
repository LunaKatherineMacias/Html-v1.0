<!DOCTYPE html>
<html>
<head>
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <h2>Registro de Usuario</h2>

    <form id="formulario">

        <label>Tipo de documento:</label><br>
        <select name="documento">
            <option value="">Seleccione...</option>
            <option value="cc">Cédula de Ciudadanía</option>
            <option value="ti">Tarjeta de Identidad</option>
            <option value="ce">Cédula de Extranjería</option>
            <option value="pp">Pasaporte</option>
        </select><br><br>

        <label>Nombre:</label>
        <input type="text" name="nombre"><br><br>

        <label>Apellido:</label>
        <input type="text" name="apellido"><br><br>

        <label>Fecha de nacimiento:</label>
        <input type="date" name="fecha"><br><br>

        <label>Teléfono:</label>
        <input type="tel" name="telefono"><br><br>

        <label>Correo electrónico:</label>
        <input type="email" name="correo"><br><br>

        <label>Intereses:</label><br>
        <input type="checkbox" name="interes"> Informática<br>
        <input type="checkbox" name="interes"> Música<br>
        <input type="checkbox" name="interes"> Arte<br><br>

        <label>Experiencia:</label>
        <textarea name="experiencia"></textarea><br><br>

        <div class="botones">
            <input type="submit" value="Enviar">
            <button type="reset">Limpiar</button>
        </div>

    </form>

</body>
</html>
