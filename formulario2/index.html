<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario 2</title>
    <link rel="stylesheet" href="./styles.css?v=1">
    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h2>Formulario de Registro</h2>

        <form id="miFormulario">
            
            <label for="tipodoc">Tipo de documento</label>
            <select id="tipodoc" name="tipodoc" multiple>
                <option value="cc">Cédula de ciudadanía (CC)</option>
                <option value="ti">Tarjeta de identidad (TI)</option>
                <option value="ce">Cédula de extranjería (CE)</option>
            </select>

            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Escribe tu nombre">

            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="correo@ejemplo.com">

            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" rows="4" placeholder="Escribe tu mensaje"></textarea>

            <div class="botones">
                <button type="submit" class="btn">Enviar</button>
                <button type="button" class="btn limpiar" onclick="document.getElementById('miFormulario').reset()">Limpiar</button>
            </div>
        </form>
    </div>

</body>
</html>
