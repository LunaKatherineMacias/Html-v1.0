<!DOCTYPE html>
<html>
<head>
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

    <h2>Registro de Usuario</h2>

    <form id="formulario">

        <!-- Tipo de documento -->
        <label>Tipo de documento:</label><br>
        <select name="documento">
            <option value="">Seleccione...</option>
            <option value="cc">Cédula de Ciudadanía</option>
            <option value="ti">Tarjeta de Identidad</option>
            <option value="ce">Cédula de Extranjería</option>
            <option value="pp">Pasaporte</option>
        </select><br><br>

        <!-- Número de documento -->
        <label>Número de documento:</label>
        <input type="text" name="num_documento"><br><br>

        <!-- Género -->
        <label>Género:</label><br>

        <div class="genero-container">
            <input type="radio" id="femenino" name="genero" value="femenino">
            <label for="femenino" class="genero-opcion">Femenino</label>

            <input type="radio" id="masculino" name="genero" value="masculino">
            <label for="masculino" class="genero-opcion">Masculino</label>

            <input type="radio" id="otro" name="genero" value="otro">
            <label for="otro" class="genero-opcion">Otro</label>
        </div><br>

        <!-- Datos -->
        <label>Nombre:</label>
        <input type="text" name="nombre"><br><br>

        <label>Apellido:</label>
        <input type="text" name="apellido"><br><br>

        <label>Fecha de nacimiento:</label>
        <input type="date" name="fecha"><br><br>

        <label>Teléfono:</label>
        <input type="tel" name="telefono"><br><br>

        <label>Correo electrónico:</label>
        <input type="email" name="correo"><br><br>

        <!-- Intereses -->
        <label>Intereses:</label><br>
        <input type="checkbox" name="interes"> Informática<br>
        <input type="checkbox" name="interes"> Música<br>
        <input type="checkbox" name="interes"> Arte<br><br>

        <!-- Experiencia -->
        <label>Experiencia:</label>
        <textarea name="experiencia"></textarea><br><br>

        <!-- Botones -->
        <div class="botones">
            <input type="submit" value="Enviar">
            <button type="reset">Limpiar</button>
        </div>

    </form>

    <!-- Mensaje de éxito -->
    <div id="mensajeExito" class="mensaje-exito">
        ✨ ¡Formulario enviado con éxito! ✨
    </div>

    <!-- Script para mostrar el mensaje -->
    <script>
        const form = document.getElementById("formulario");
        const mensaje = document.getElementById("mensajeExito");

        form.addEventListener("submit", function(e) {
            e.preventDefault();
            mensaje.style.display = "block";

            setTimeout(() => {
                mensaje.style.display = "none";
            }, 3000);

            form.reset();
        });
    </script>

</body>
</html>
